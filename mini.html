<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>番茄钟迷你窗</title>
  <link rel="stylesheet" href="mini.css" />
</head>
<body>
  <div class="mini-container" id="miniContainer">
    <div class="drag-area" id="dragArea">
      <span class="mini-timer" id="miniTimer">25:00</span>
    </div>
    <div class="mini-actions">
      <button class="mini-btn" id="miniToggleBtn" title="开始/暂停">▶</button>
      <button class="mini-btn" id="miniResetBtn" title="重置">↺</button>
      <button class="mini-btn" id="miniShowBtn" title="显示主窗口">⬛</button>
      <button class="mini-btn close" id="miniCloseBtn" title="隐藏迷你窗">✕</button>
    </div>
  </div>
  <script src="mini.js"></script>
</body>
</html>
