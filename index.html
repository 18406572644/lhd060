<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>番茄钟日记</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app" id="app">
    <!-- 左栏 番茄钟 -->
    <aside class="sidebar">
      <div class="pomodoro-section">
        <div class="header-row">
          <h1 class="app-title">番茄钟日记</h1>
          <button class="settings-btn" id="settingsBtn" title="设置">⚙</button>
        </div>

        <div class="duration-selector" id="durationSelector">
          <button class="duration-btn active" data-minutes="25">25</button>
          <button class="duration-btn" data-minutes="30">30</button>
          <button class="duration-btn" data-minutes="45">45</button>
          <button class="duration-btn" data-minutes="60">60</button>
          <button class="duration-btn custom-add-btn" id="customDurationBtn" title="自定义时长">+</button>
          <span class="duration-label">分钟</span>
        </div>

        <div class="custom-duration-row" id="customDurationRow" style="display:none;">
          <input type="number" id="customDurationInput" class="custom-duration-input" min="1" max="120" placeholder="1-120" />
          <button class="custom-duration-save" id="saveCustomDuration">保存</button>
          <button class="custom-duration-cancel" id="cancelCustomDuration">✕</button>
        </div>

        <div class="custom-presets" id="customPresets"></div>

        <div class="focus-mode-row">
          <button class="focus-mode-btn" id="focusModeBtn" title="深度专注模式">
            <span class="focus-icon">🎯</span>
            <span class="focus-label">深度专注</span>
          </button>
          <button class="fullscreen-btn" id="fullscreenBtn" title="全屏沉浸">
            <span class="fullscreen-icon">⛶</span>
          </button>
        </div>

        <div class="timer-container">
          <svg class="timer-ring" viewBox="0 0 200 200">
            <circle class="ring-bg" cx="100" cy="100" r="85" />
            <circle class="ring-progress" cx="100" cy="100" r="85" id="ringProgress" />
          </svg>
          <div class="timer-display">
            <span id="timerText">25:00</span>
          </div>
        </div>

        <div class="task-selector">
          <label class="task-selector-label">关联任务</label>
          <select class="task-select" id="taskSelect">
            <option value="">不关联任务</option>
          </select>
        </div>

        <div class="timer-controls">
          <button class="ctrl-btn primary" id="startBtn">开始</button>
          <button class="ctrl-btn" id="pauseBtn" disabled>暂停</button>
          <button class="ctrl-btn" id="resetBtn">重置</button>
        </div>

        <div class="today-count">
          <span class="today-label">今日番茄</span>
          <div class="tomatoes" id="tomatoes"></div>
        </div>
      </div>
    </aside>

    <!-- 右栏 任务 & 日记 -->
    <main class="content">
      <header class="content-header">
        <h2 class="date-title" id="dateTitle"></h2>
        <div class="content-header-right">
          <div class="tab-switcher">
            <button class="tab-btn active" data-tab="tasks">任务</button>
            <button class="tab-btn" data-tab="records">日记</button>
          </div>
          <input type="date" id="datePicker" class="date-picker" />
        </div>
      </header>

      <div class="tab-content" id="tasksTab">
        <div class="tasks-header">
          <button class="add-task-btn" id="addTaskBtn">
            <span class="add-task-icon">+</span> 新增任务
          </button>
          <div class="tasks-summary" id="tasksSummary"></div>
        </div>
        <div class="tasks-container" id="tasksContainer"></div>
      </div>

      <div class="tab-content" id="recordsTab" style="display:none;">
        <div class="records-container" id="recordsContainer"></div>
      </div>
    </main>

    <!-- 底部统计条 -->
    <footer class="stats-bar">
      <div class="stat-item">
        <span class="stat-label">今日专注</span>
        <span class="stat-value" id="todayMinutes">0 分钟</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-label">本周总计</span>
        <span class="stat-value" id="weekMinutes">0 分钟</span>
      </div>
      <div class="stat-divider"></div>
      <div class="bar-chart" id="barChart"></div>
      <button class="stats-open-btn" id="statsOpenBtn" title="查看详细统计">
        <span>📊</span> 统计
      </button>
    </footer>
  </div>

  <!-- 记录弹窗 -->
  <div class="modal-overlay" id="recordModal" style="display:none;">
    <div class="modal">
      <h3 class="modal-title">这个番茄钟你完成了什么？</h3>
      <div class="record-task-info" id="recordTaskInfo"></div>
      <input type="text" id="recordInput" class="modal-input" placeholder="一句话记录..." maxlength="200" />
      <div class="modal-actions">
        <button class="modal-btn cancel" id="cancelRecord">跳过</button>
        <button class="modal-btn confirm" id="saveRecord">保存</button>
      </div>
    </div>
  </div>

  <!-- 任务弹窗 -->
  <div class="modal-overlay" id="taskModal" style="display:none;">
    <div class="modal">
      <h3 class="modal-title" id="taskModalTitle">新增任务</h3>
      <div class="task-form">
        <div class="form-group">
          <label class="form-label">任务名称</label>
          <input type="text" id="taskNameInput" class="form-input" placeholder="输入任务名称..." maxlength="100" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">预估番茄数</label>
            <div class="pomodoro-counter">
              <button class="pomodoro-count-btn" id="pomodoroMinus">−</button>
              <span class="pomodoro-count-value" id="pomodoroCountDisplay">1</span>
              <button class="pomodoro-count-btn" id="pomodoroPlus">+</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">优先级</label>
            <select id="taskPrioritySelect" class="form-input">
              <option value="1">低</option>
              <option value="2" selected>中</option>
              <option value="3">高</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="cancelTask">取消</button>
        <button class="modal-btn confirm" id="saveTask">保存</button>
      </div>
    </div>
  </div>

  <!-- 编辑弹窗 -->
  <div class="modal-overlay" id="editModal" style="display:none;">
    <div class="modal">
      <h3 class="modal-title">编辑记录</h3>
      <input type="text" id="editInput" class="modal-input" placeholder="记录内容..." maxlength="200" />
      <div class="modal-actions">
        <button class="modal-btn cancel" id="cancelEdit">取消</button>
        <button class="modal-btn confirm" id="saveEdit">保存</button>
      </div>
    </div>
  </div>

  <!-- 设置弹窗 -->
  <div class="modal-overlay" id="settingsModal" style="display:none;">
    <div class="modal settings-modal">
      <div class="modal-header">
        <h3 class="modal-title">设置</h3>
        <button class="modal-close" id="closeSettings">✕</button>
      </div>
      <div class="settings-section">
        <h4 class="settings-section-title">快捷键</h4>
        <div class="shortcut-item">
          <span class="shortcut-label">开始/暂停番茄钟</span>
          <div class="shortcut-input-wrap">
            <input type="text" class="shortcut-input" id="shortcutToggleTimer" data-key="toggleTimer" readonly placeholder="点击录制" />
            <button class="shortcut-clear" data-key="toggleTimer" title="重置为默认">↺</button>
          </div>
          <span class="shortcut-error" id="errorToggleTimer"></span>
        </div>
        <div class="shortcut-item">
          <span class="shortcut-label">重置番茄钟</span>
          <div class="shortcut-input-wrap">
            <input type="text" class="shortcut-input" id="shortcutResetTimer" data-key="resetTimer" readonly placeholder="点击录制" />
            <button class="shortcut-clear" data-key="resetTimer" title="重置为默认">↺</button>
          </div>
          <span class="shortcut-error" id="errorResetTimer"></span>
        </div>
        <div class="shortcut-item">
          <span class="shortcut-label">显示/隐藏主窗口</span>
          <div class="shortcut-input-wrap">
            <input type="text" class="shortcut-input" id="shortcutToggleWindow" data-key="toggleWindow" readonly placeholder="点击录制" />
            <button class="shortcut-clear" data-key="toggleWindow" title="重置为默认">↺</button>
          </div>
          <span class="shortcut-error" id="errorToggleWindow"></span>
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="cancelSettings">取消</button>
        <button class="modal-btn confirm" id="saveSettings">保存</button>
      </div>
    </div>
  </div>

  <!-- 统计弹窗 -->
  <div class="modal-overlay stats-modal-overlay" id="statsModal" style="display:none;">
    <div class="stats-modal">
      <div class="modal-header stats-modal-header">
        <h3 class="modal-title">📊 统计数据</h3>
        <button class="modal-close" id="closeStats">✕</button>
      </div>

      <!-- 概览卡片 -->
      <div class="stats-overview">
        <div class="overview-card">
          <div class="overview-icon">🔥</div>
          <div class="overview-info">
            <span class="overview-label">当前连续</span>
            <span class="overview-value" id="currentStreak">0 天</span>
          </div>
        </div>
        <div class="overview-card">
          <div class="overview-icon">🏆</div>
          <div class="overview-info">
            <span class="overview-label">最长连续</span>
            <span class="overview-value" id="longestStreak">0 天</span>
          </div>
        </div>
        <div class="overview-card">
          <div class="overview-icon">⏱️</div>
          <div class="overview-info">
            <span class="overview-label">累计专注</span>
            <span class="overview-value" id="totalMinutes">0 分钟</span>
          </div>
        </div>
        <div class="overview-card">
          <div class="overview-icon">🍅</div>
          <div class="overview-info">
            <span class="overview-label">累计番茄</span>
            <span class="overview-value" id="totalPomodoros">0 个</span>
          </div>
        </div>
      </div>

      <!-- 日历热力图 -->
      <div class="stats-section">
        <h4 class="stats-section-title">过去一年贡献热力图</h4>
        <div class="heatmap-container" id="heatmapContainer"></div>
        <div class="heatmap-legend">
          <span>少</span>
          <div class="legend-colors">
            <span class="legend-color level-0"></span>
            <span class="legend-color level-1"></span>
            <span class="legend-color level-2"></span>
            <span class="legend-color level-3"></span>
            <span class="legend-color level-4"></span>
          </div>
          <span>多</span>
        </div>
      </div>

      <!-- 趋势折线图 -->
      <div class="stats-section">
        <div class="stats-section-header">
          <h4 class="stats-section-title">专注时长趋势</h4>
          <div class="trend-toggle">
            <button class="trend-toggle-btn active" data-period="30days">30天</button>
            <button class="trend-toggle-btn" data-period="12weeks">12周</button>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="trendChart"></canvas>
        </div>
      </div>

      <!-- 时段分布和标签分布并排 -->
      <div class="stats-row">
        <div class="stats-section half">
          <h4 class="stats-section-title">时段分布</h4>
          <div class="chart-container">
            <canvas id="hourChart"></canvas>
          </div>
        </div>
        <div class="stats-section half">
          <h4 class="stats-section-title">标签分布</h4>
          <div class="chart-container pie-chart-container">
            <canvas id="tagChart"></canvas>
          </div>
          <div class="tag-empty-hint" id="tagEmptyHint" style="display:none;">
            暂无标签数据。在记录内容中使用 <code>#标签名</code> 来添加标签。
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="node_modules/chart.js/dist/chart.umd.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
